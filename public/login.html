<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;900&family=Instrument+Serif&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 32 32%27%3E%3Crect width=%2732%27 height=%2732%27 fill=%27%23080C10%27/%3E%3Ctext x=%2716%27 y=%2724%27 font-family=%27Arial%27 font-weight=%27900%27 font-size=%2724%27 fill=%27%231A56DB%27 text-anchor=%27middle%27%3EW%3C/text%3E%3C/svg%3E">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WIN STARK — Executive AI Cockpit</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  /* === WIN STARK DESIGN SYSTEM === */
  :root {
    --color-bg: #FAF7F2; --color-bg-subtle: #F3EFE8; --color-card: #FFFFFF;
    --color-ink: #1F1D1A; --color-ink-2: #46433E; --color-ink-3: #78746D;
    --color-line: #E8E2D7; --color-accent: #2B6CB0;
    --color-peach: #F4C8C0; --color-lilac: #E8D4E8; --color-sky: #C8DCE8;
    --color-success: #7BB77A;
    --font-sans: 'DM Sans', system-ui, -apple-system, sans-serif;
    --shadow-md: 0 4px 12px rgba(30,25,15,0.08);
    --shadow-lg: 0 8px 24px rgba(30,25,15,0.1);
    /* bridge */
    --black: #FAF7F2; --dark: #F3EFE8; --card: #FFFFFF; --border: #E8E2D7;
    --blue: #2B6CB0; --blue-hover: #245A97; --blue-light: #3B82C4;
    --blue-glow: rgba(43,108,176,0.2); --blue-dim: rgba(43,108,176,0.1);
    --white: #1F1D1A; --muted: #78746D; --text: #46433E;
    --bg-glass: rgba(250,247,242,0.97); --bg-overlay: rgba(250,247,242,0.85);
    --ambient-gradient: radial-gradient(ellipse 60% 50% at 50% 0%, rgba(244,200,192,0.35) 0%, transparent 70%), radial-gradient(ellipse 40% 30% at 100% 100%, rgba(200,220,232,0.25) 0%, transparent 60%);
  }
  [data-theme="dark"] {
    --color-bg: #17161A; --color-bg-subtle: #201E22; --color-card: #1E1C20;
    --color-ink: #F5F2EC; --color-ink-2: #C9C5BD; --color-ink-3: #8A857D;
    --color-line: #2B292E; --color-accent: #2B6CB0;
    --color-success: #7BB77A;
    /* bridge */
    --black: #17161A; --dark: #201E22; --card: #1E1C20; --border: #2B292E;
    --blue: #2B6CB0; --blue-hover: #3B82C4; --blue-light: #60A5FA;
    --blue-glow: rgba(43,108,176,0.3); --blue-dim: rgba(43,108,176,0.15);
    --white: #F5F2EC; --muted: #8A857D; --text: #C9C5BD;
    --bg-glass: rgba(23,22,26,0.97); --bg-overlay: rgba(23,22,26,0.7);
    --ambient-gradient: radial-gradient(ellipse 60% 50% at 50% 0%, rgba(43,108,176,0.1) 0%, transparent 70%), radial-gradient(ellipse 40% 30% at 100% 100%, rgba(43,108,176,0.06) 0%, transparent 60%);
  }

  html, body {
    height: 100%;
    font-family: var(--font-sans);
    background: var(--black);
    color: var(--white);
    overflow: hidden;
    transition: background 0.3s, color 0.3s;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: var(--ambient-gradient);
    pointer-events: none;
  }

  .login-container {
    position: relative;
    z-index: 10;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }

  /* WIN STARK Logo */
  .logo-block {
    text-align: center;
    margin-bottom: 3rem;
  }

  .logo-win {
    font-family: Arial, sans-serif;
    font-weight: 900;
    font-size: 4rem;
    letter-spacing: -0.02em;
    color: var(--white);
    line-height: 1;
    text-transform: uppercase;
  }

  .logo-win span {
    color: var(--blue);
  }

  .logo-stark {
    font-family: Arial, sans-serif;
    font-weight: 900;
    font-size: 4rem;
    letter-spacing: 0.08em;
    color: var(--white);
    line-height: 1;
    text-transform: uppercase;
  }

  .logo-separator {
    display: inline-block;
    width: 6px;
    height: 6px;
    background: var(--blue);
    border-radius: 50%;
    margin: 0 0.1em;
    vertical-align: middle;
    position: relative;
    top: -0.15em;
  }

  .logo-tagline {
    font-family: Arial, sans-serif;
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: 0.35em;
    color: var(--blue-light);
    text-transform: uppercase;
    margin-top: 0.5rem;
  }

  .logo-sub {
    display: inline-block;
    background: var(--blue);
    color: #fff;
    font-family: Arial, sans-serif;
    font-weight: 700;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    padding: 3px 10px;
    margin-top: 0.6rem;
    text-transform: uppercase;
  }

  /* Login card */
  .login-card {
    width: 100%;
    max-width: 420px;
    background: var(--card);
    border: 1px solid var(--border);
    border-top: 2px solid var(--blue);
    padding: 2.5rem;
    position: relative;
    box-shadow: var(--shadow-lg);
  }

  .login-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--blue-light), transparent);
  }

  .login-title {
    font-family: Arial, sans-serif;
    font-weight: 700;
    font-size: 1.1rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 2rem;
    text-align: center;
  }

  .field {
    margin-bottom: 1.25rem;
  }

  .field label {
    display: block;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.5rem;
  }

  .field input {
    width: 100%;
    background: var(--dark);
    border: 1px solid var(--border);
    color: var(--white);
    font-family: Arial, sans-serif;
    font-size: 0.95rem;
    padding: 0.75rem 1rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .field input:focus {
    border-color: var(--blue);
    box-shadow: 0 0 0 3px var(--blue-glow);
  }

  .field input::placeholder {
    color: var(--muted);
  }

  .btn-login {
    width: 100%;
    background: var(--blue);
    color: #fff;
    border: none;
    font-family: Arial, sans-serif;
    font-weight: 700;
    font-size: 1rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 0.875rem;
    cursor: pointer;
    transition: background 0.2s, box-shadow 0.2s;
    margin-top: 0.5rem;
  }

  .btn-login:hover {
    background: var(--blue-hover);
    box-shadow: 0 0 20px var(--blue-glow);
  }

  .btn-login:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .error-msg {
    background: rgba(220, 50, 50, 0.12);
    border: 1px solid rgba(220, 50, 50, 0.3);
    color: #FC8181;
    font-size: 0.85rem;
    padding: 0.75rem 1rem;
    margin-top: 1rem;
    display: none;
  }

  .error-msg.visible { display: block; }

  .footer-text {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    min-height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--dark);
    border-top: 1px solid var(--border);
    font-size: 0.6rem;
    font-weight: 500;
    letter-spacing: 0.08em;
    color: var(--muted);
    text-transform: uppercase;
    text-align: center;
    padding: 4px 1rem;
    line-height: 1.5;
    z-index: 50;
  }

  @media (max-width: 680px) {
    .footer-text, .footer {
      font-size: 0.52rem;
      letter-spacing: 0.05em;
      min-height: 36px;
      padding: 4px 0.75rem;
      line-height: 1.5;
    }
  }

  /* Corner decorations */
  .corner {
    position: fixed;
    width: 40px;
    height: 40px;
    opacity: 0.3;
  }
  .corner-tl { top: 20px; left: 20px; border-top: 1px solid var(--blue); border-left: 1px solid var(--blue); }
  .corner-tr { top: 20px; right: 20px; border-top: 1px solid var(--blue); border-right: 1px solid var(--blue); }
  .corner-bl { bottom: 20px; left: 20px; border-bottom: 1px solid var(--blue); border-left: 1px solid var(--blue); }
  .corner-br { bottom: 20px; right: 20px; border-bottom: 1px solid var(--blue); border-right: 1px solid var(--blue); }

  /* Theme toggle */
  .theme-toggle {
    position: fixed;
    top: 16px;
    right: 16px;
    width: 36px;
    height: 36px;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    z-index: 50;
    box-shadow: var(--shadow-sm);
  }
  .theme-toggle:hover { border-color: var(--blue); color: var(--blue); }
</style>
<script>(function(){var t=localStorage.getItem('ws_theme')||'light';document.documentElement.setAttribute('data-theme',t);})()</script>
</head>
<body>

<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>

<button class="theme-toggle" id="themeToggle" title="Alternar tema">
  <svg id="iconSun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
  <svg id="iconMoon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
</button>

<div class="login-container">
  <div class="logo-block">
    <div>
      <span class="logo-win">Wi<span>N</span></span><span class="logo-separator"></span><span class="logo-stark">STARK</span>
    </div>
    <div class="logo-sub">Business</div>
    <div class="logo-tagline">Executive AI Cockpit</div>
  </div>

  <div class="login-card">
    <div class="login-title">Acesso ao Sistema</div>

    <form id="loginForm">
      <div class="field">
        <label>Email</label>
        <input type="email" id="email" placeholder="seu@email.com" autocomplete="email" required>
      </div>
      <div class="field">
        <label>Senha</label>
        <input type="password" id="password" placeholder="Sua senha" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn-login" id="btnLogin">Acessar Cockpit</button>
      <div class="error-msg" id="errorMsg"></div>
    </form>
  </div>

  <div class="footer-text">&copy; WIN Business School &nbsp;&mdash;&nbsp; WIN STARK PROJECT &nbsp;&mdash;&nbsp; Todos os direitos reservados</div>
</div>

<script>
  // Theme
  (function() {
    const saved = localStorage.getItem('ws_theme') || 'light';
    document.documentElement.setAttribute('data-theme', saved);
    function updateIcons() {
      const dark = document.documentElement.getAttribute('data-theme') === 'dark';
      document.getElementById('iconSun').style.display = dark ? 'block' : 'none';
      document.getElementById('iconMoon').style.display = dark ? 'none' : 'block';
    }
    document.addEventListener('DOMContentLoaded', () => {
      updateIcons();
      document.getElementById('themeToggle').addEventListener('click', () => {
        const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('ws_theme', next);
        updateIcons();
      });
    });
  })();

  // Redirect if already logged in
  const token = localStorage.getItem('ws_token');
  if (token) {
    const user = JSON.parse(localStorage.getItem('ws_user') || '{}');
    window.location.href = user.role === 'admin' ? '/admin.html' : '/';
  }

  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('btnLogin');
    const err = document.getElementById('errorMsg');
    err.classList.remove('visible');
    btn.disabled = true;
    btn.textContent = 'Autenticando...';

    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email: document.getElementById('email').value,
          password: document.getElementById('password').value
        })
      });

      const data = await res.json();
      if (!res.ok) {
        err.textContent = data.error || 'Erro ao autenticar';
        err.classList.add('visible');
        btn.disabled = false;
        btn.textContent = 'Acessar Cockpit';
        return;
      }

      localStorage.setItem('ws_token', data.token);
      localStorage.setItem('ws_user', JSON.stringify(data.user));

      window.location.href = data.user.role === 'admin' ? '/admin.html' : '/';
    } catch (ex) {
      err.textContent = 'Erro de conexao. Tente novamente.';
      err.classList.add('visible');
      btn.disabled = false;
      btn.textContent = 'Acessar Cockpit';
    }
  });
</script>
</body>
</html>
